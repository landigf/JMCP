name: Repo Gardening

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  garden:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate docs
        run: npm run docs:check

      - name: Validate quality stub
        run: npm run quality:stub

      - name: Write workflow summary
        run: |
          {
            echo "## Repository gardening"
            echo
            echo "- docs validation passed"
            echo "- quality stub is present"
            echo "- schedule is active"
          } >> "$GITHUB_STEP_SUMMARY"
