name: Docs Validation

on:
  push:
    branches:
      - main
    paths:
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "README.md"
      - "SECURITY.md"
      - "docs/**"
      - "tooling/repo-guardrails/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "README.md"
      - "SECURITY.md"
      - "docs/**"
      - "tooling/repo-guardrails/**"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate docs
        run: npm run docs:check
