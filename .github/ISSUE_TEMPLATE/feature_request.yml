name: Feature request
description: Propose a new capability or workflow
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security impact
      description: Describe any auth, secret, logging, or privacy implications.
    validations:
      required: true
